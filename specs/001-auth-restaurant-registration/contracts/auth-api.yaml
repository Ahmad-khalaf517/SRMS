openapi: 3.0.3
info:
  title: SRMS Auth API Contract
  version: 0.1.0
  description: |
    Contract definition for AUTH-001 registration and login endpoints.
servers:
  - url: /api/v1
paths:
  /auth/register:
    post:
      summary: Register restaurant and first admin user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Duplicate email conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/login:
    post:
      summary: Authenticate existing user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessEnvelope'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials or inactive user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    RegisterRequest:
      type: object
      required: [restaurant, user]
      properties:
        restaurant:
          $ref: '#/components/schemas/RestaurantInput'
        user:
          $ref: '#/components/schemas/RegisterUserInput'
    RestaurantInput:
      type: object
      required: [name, address, phone, email]
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
    RegisterUserInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthSuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuthData'
    AuthData:
      type: object
      required: [user, accessToken]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        accessToken:
          type: string
    AuthUser:
      type: object
      required: [id, restaurantId, name, email, role, isActive]
      properties:
        id:
          type: string
        restaurantId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, CASHIER, KITCHEN_STAFF]
        isActive:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [success, message, errors]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
