openapi: 3.0.3
info:
  title: SRMS Orders API
  version: 1.0.0
  description: Contract draft for ORDER-001 order management, POS, and analytics endpoints.
  x-order-001-notes:
    - Order numbers are generated server-side during order creation.
    - Totals (subtotal, tax, total) are authoritative from backend computation.
    - Valid status transitions: PENDING -> PREPARING -> READY -> COMPLETED.
    - /orders/my must only return orders created by the authenticated cashier.
paths:
  /orders:
    post:
      summary: Create order from POS cart
      security:
        - bearerAuth: []
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderDTO'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSuccessOrder'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    get:
      summary: List restaurant orders (admin/kitchen)
      security:
        - bearerAuth: []
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/CreatedBy'
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSuccessOrderList'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /orders/my:
    get:
      summary: List authenticated cashier's orders
      security:
        - bearerAuth: []
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
      responses:
        '200':
          description: Cashier-owned order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSuccessOrderList'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /orders/{id}:
    get:
      summary: Get order details by id
      security:
        - bearerAuth: []
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSuccessOrder'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /orders/{id}/status:
    patch:
      summary: Update order status
      security:
        - bearerAuth: []
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusDTO'
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSuccessOrder'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /orders/metrics:
    get:
      summary: Get order metrics by date range
      security:
        - bearerAuth: []
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
      responses:
        '200':
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSuccessMetrics'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /orders/top-selling:
    get:
      summary: Get top-selling items by date range
      security:
        - bearerAuth: []
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Top-selling items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSuccessTopSelling'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    Search:
      name: search
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/OrderStatus'
    CreatedBy:
      name: createdBy
      in: query
      schema:
        type: string
    From:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      schema:
        type: string
        format: date-time
  schemas:
    OrderStatus:
      type: string
      enum: [PENDING, PREPARING, READY, COMPLETED]
    CreateOrderDTO:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [menuItemId, quantity]
            properties:
              menuItemId:
                type: string
              quantity:
                type: integer
                minimum: 1
              notes:
                type: string
    UpdateOrderStatusDTO:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
    OrderItem:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        menuItemId:
          type: string
        quantity:
          type: integer
        price:
          type: number
        notes:
          type: string
          nullable: true
    Order:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number
        restaurantId:
          type: string
        createdBy:
          type: string
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    OrderList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    OrderMetrics:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
    TopSellingItem:
      type: object
      properties:
        menuItemId:
          type: string
        name:
          type: string
        quantitySold:
          type: integer
        revenueContribution:
          type: number
    EnvelopeSuccessOrder:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/Order'
    EnvelopeSuccessOrderList:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/OrderList'
    EnvelopeSuccessMetrics:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/OrderMetrics'
    EnvelopeSuccessTopSelling:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/TopSellingItem'
    EnvelopeError:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeError'
